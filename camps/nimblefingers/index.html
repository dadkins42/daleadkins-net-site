<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>NimbleFingers · Students</title>
  <link rel="stylesheet" href="../../css/camp.css">
</head>
<body>

  <!-- Password gate (placeholder — encrypt with StatiCrypt before publishing real content) -->
  <div id="gate">
    <div class="box">
      <div class="lock">♪</div>
      <h1>Students area</h1>
      <p class="hint" style="margin-top:8px">Just for NimbleFingers students — enter your camp password.</p>
      <input id="pw" type="password" placeholder="Camp password" autocomplete="off" autocapitalize="off">
      <button id="go">Enter</button>
      <p class="hint" id="msg">Sent in your welcome email.</p>
    </div>
  </div>

  <!-- Rendered from content.json by camp.js -->
  <div id="content">
    <header class="hero" id="hero">
      <div class="hero-inner">
        <h1 id="hero-title">&nbsp;</h1>
        <p class="hero-sub" id="hero-sub"></p>
      </div>
    </header>
    <div class="wrap">
      <p class="welcome" id="welcome"></p>
      <div id="posts"></div>
      <div id="sections"></div>
    </div>
  </div>

  <script src="../../js/camp.js"></script>
</body>
</html>
